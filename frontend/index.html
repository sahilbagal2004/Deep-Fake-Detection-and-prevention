<!DOCTYPE html>
<html>

<head>

<title>Deepfake Detection</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#667eea,#764ba2);

}

.container{

background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);

padding:50px;
width:500px;

border-radius:18px;

box-shadow:0 25px 60px rgba(0,0,0,0.3);

text-align:center;

color:white;

transition:0.3s;

}

.container:hover{

transform:translateY(-5px);

}

h1{

margin-bottom:25px;
font-size:32px;

}

.upload-box{

border:2px dashed rgba(255,255,255,0.7);
padding:35px;

border-radius:12px;

cursor:pointer;

transition:0.3s;

}

.upload-box:hover{

background:rgba(255,255,255,0.1);

}

input{

display:none;

}

button{

margin-top:20px;

padding:14px 35px;

border:none;
border-radius:10px;

background:linear-gradient(45deg,#00c6ff,#0072ff);

color:white;
font-size:16px;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.08);

box-shadow:0 10px 20px rgba(0,0,0,0.2);

}

.preview img{

margin-top:25px;

max-width:300px;

border-radius:12px;

box-shadow:0 15px 30px rgba(0,0,0,0.25);

}

#result{

margin-top:20px;

font-size:24px;
font-weight:bold;

}

.real{

color:#00ff9d;

}

.fake{

color:#ff4d4d;

}

.progress{

margin-top:15px;
height:6px;

background:rgba(255,255,255,0.2);
border-radius:10px;

overflow:hidden;

}

.bar{

height:100%;
width:0%;

background:#00ff9d;

transition:width 1s;

}

</style>

</head>

<body>

<div class="container">

<h1>Deepfake Detection</h1>

<label class="upload-box">

Click to Upload Image

<input type="file" id="file" onchange="previewImage()">

</label>

<button onclick="upload()">Detect</button>

<div class="preview">

<img id="preview">

</div>

<div class="progress">

<div class="bar" id="progressBar"></div>

</div>

<h2 id="result"></h2>

</div>

<script src="script.js"></script>

<script>

function previewImage(){

const file=document.getElementById("file").files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(e){

document.getElementById("preview").src=e.target.result

}

reader.readAsDataURL(file)

}

</script>

</body>

</html>
